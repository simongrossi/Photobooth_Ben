<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titre %}Admin photobooth{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="logo" href="{{ url_for('dashboard.index') }}">Photobooth · Admin</a>
    <nav class="nav">
      <a href="{{ url_for('dashboard.index') }}">Dashboard</a>
      <a href="{{ url_for('gallery.index') }}">Galerie</a>
      <a href="{{ url_for('templates.index') }}">Templates</a>
      <a href="{{ url_for('settings.index') }}">Réglages</a>
    </nav>
  </header>

  <main class="content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="flashes">
          {% for category, msg in messages %}
            <li class="flash flash--{{ category }}">{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    {% block contenu %}{% endblock %}
  </main>
</body>
</html>
