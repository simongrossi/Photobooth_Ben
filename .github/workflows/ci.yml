name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps (pure Python modules + web admin)
        # Les tests isolent les modules purs (montage, stats, status, web/) ;
        # inutile d'installer pygame/gphoto2/cv2 qui demandent des bindings
        # système. Flask est requis pour les tests de l'interface admin web.
        run: pip install Pillow flask pytest pytest-cov ruff

      - name: Ruff check
        run: python -m ruff check .

      - name: Pytest + coverage
        run: python -m pytest --cov --cov-report=term

      - name: Coverage summary
        if: always()
        run: python -m coverage report
