name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps (pure Python modules)
        # Les tests isolent montage.py (pur PIL) ; inutile d'installer pygame/gphoto2/cv2
        # qui demandent des bindings système.
        run: pip install Pillow pytest ruff

      - name: Ruff check
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest test_montage.py -v
